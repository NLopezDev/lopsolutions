<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="LOP Solutions">
  <defs>
    <linearGradient id="lopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="50%" stop-color="#0f1f3d"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="50%" stop-color="#0f1f3d"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- L -->
  <path d="M 70 30 L 70 130 L 145 130" fill="none" stroke="#0f1f3d" stroke-width="22" stroke-linecap="square"/>

  <!-- Circle (O) -->
  <circle cx="240" cy="80" r="55" fill="none" stroke="url(#ringGrad)" stroke-width="14"/>

  <!-- Server icon inside O -->
  <g transform="translate(215, 55)">
    <rect x="0" y="0" width="50" height="14" rx="2" fill="#0f1f3d"/>
    <circle cx="6" cy="7" r="2" fill="#3b82f6"/>
    <rect x="0" y="18" width="50" height="14" rx="2" fill="#0f1f3d"/>
    <circle cx="6" cy="25" r="2" fill="#3b82f6"/>
    <rect x="0" y="36" width="50" height="14" rx="2" fill="#0f1f3d"/>
    <circle cx="6" cy="43" r="2" fill="#3b82f6"/>
  </g>

  <!-- P -->
  <path d="M 320 30 L 320 130 M 320 30 L 360 30 Q 395 30 395 60 Q 395 90 360 90 L 320 90"
        fill="none" stroke="#3b82f6" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- SOLUTIONS -->
  <text x="240" y="170" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="26"
        fill="#0f1f3d" letter-spacing="6">SOLUTIONS</text>

  <!-- Tagline with lines -->
  <line x1="115" y1="190" x2="155" y2="190" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="194" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-weight="500" font-size="10"
        fill="#0f1f3d" letter-spacing="2">IT SUPPORT &amp; INFRASTRUCTURE</text>
  <line x1="325" y1="190" x2="365" y2="190" stroke="#2563eb" stroke-width="1.5"/>
</svg>
